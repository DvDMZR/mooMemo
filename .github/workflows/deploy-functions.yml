name: Deploy Firebase Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Write service account key
        # Über env + printf statt Shell-Interpolation: robust gegen Sonderzeichen
        # im JSON und kein Risiko, das Secret in Logs zu interpolieren.
        run: printf '%s' "$FIREBASE_SA_JSON" > /tmp/sa.json
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --force --project moomemo-a9012
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
